name: Build C++ Standalone Windows Executable

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSVC Compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake Build Target
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Compile Standalone Executable
        run: cmake --build build --config Release

      - name: Confirm Executable Directory Assets
        run: |
          dir build\Release\

      - name: Upload Win64 Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: diecast-photo-catalogue-cpp-win64
          path: build/Release/*.exe
