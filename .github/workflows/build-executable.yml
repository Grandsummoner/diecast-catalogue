name: Build Desktop Executables

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Generate standalone executables using pkg
        run: |
          mkdir -p build
          # Compile for Windows, Linux, macOS (Intel), and macOS (Apple Silicon) using node20 target
          npx pkg dist/server.cjs \
            --targets node20-win-x64,node20-linux-x64,node20-macos-x64,node20-macos-arm64 \
            --out-path build/

      - name: Prepare distribution packages
        run: |
          cd build
          
          # 1. Windows Package
          if [ -f "server-win.exe" ]; then
            mv server-win.exe diecast-catalogue.exe
            zip diecast-catalogue-windows.zip diecast-catalogue.exe
          fi
          
          # 2. macOS Apple Silicon Package
          if [ -f "server-macos-arm64" ]; then
            mv server-macos-arm64 diecast-catalogue-silicon
            chmod +x diecast-catalogue-silicon
            zip diecast-catalogue-macos-silicon.zip diecast-catalogue-silicon
          fi

          # 3. macOS Intel Package
          if [ -f "server-macos-x64" ]; then
            mv server-macos-x64 diecast-catalogue-intel
            chmod +x diecast-catalogue-intel
            zip diecast-catalogue-macos-intel.zip diecast-catalogue-intel
          fi

          # 4. Linux Package
          if [ -f "server-linux-x64" ]; then
            mv server-linux-x64 diecast-catalogue-linux
            chmod +x diecast-catalogue-linux
            zip diecast-catalogue-linux.zip diecast-catalogue-linux
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ## Standalone Desktop Applications 🚗
            
            Double-click and run! No command-line compilation or Node.js installations required.
            
            ### Downloads
            - **Windows (x64)**: Download `diecast-catalogue-windows.zip`, extract, and double-click `diecast-catalogue.exe`.
            - **macOS Apple Silicon (M1/M2/M3)**: Download `diecast-catalogue-macos-silicon.zip`, extract, and run `diecast-catalogue-silicon`.
            - **macOS Intel**: Download `diecast-catalogue-macos-intel.zip`, extract, and run `diecast-catalogue-intel`.
            - **Linux (x64)**: Download `diecast-catalogue-linux.zip`, extract, and run `diecast-catalogue-linux`.
            
            *Note: When running on Windows or macOS for the first time, you may need to grant security permissions (e.g., bypass Windows SmartScreen or macOS Gatekeeper) as these are self-signed standalone bundles.*
          draft: false
          prerelease: false
          files: |
            build/diecast-catalogue-windows.zip
            build/diecast-catalogue-macos-silicon.zip
            build/diecast-catalogue-macos-intel.zip
            build/diecast-catalogue-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
