name: Build Desktop Executables

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Generate standalone executables using pkg
        run: |
          mkdir -p build
          # Compile only for Windows using node18 target, loading assets from pkg-config.json
          npx pkg dist/server.cjs \
            --config pkg-config.json \
            --targets node18-win-x64 \
            --output build/diecast-catalogue.exe

      - name: Prepare distribution packages
        run: |
          cd build
          zip diecast-catalogue-windows.zip diecast-catalogue.exe

      - name: Upload Build Artifacts to Actions Page
        uses: actions/upload-artifact@v4
        with:
          name: desktop-executables
          path: build/diecast-catalogue-windows.zip
          retention-days: 7
